name: Scrape Facebook Photos

on:
  workflow_dispatch:
    inputs:
      page_photos_url:
        description: "Facebook page Photos tab URL"
        required: false
        default: "https://web.facebook.com/profile.php?id=61591488226786&sk=photos"
      max_scrolls:
        description: "Max listing pages to paginate through"
        required: false
        default: "3"
      concurrency:
        description: "Parallel detail/download workers"
        required: false
        default: "6"
  # Uncomment to also run on a schedule:
  # schedule:
  #   - cron: "0 6 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PAGE_PHOTOS_URL: ${{ github.event.inputs.page_photos_url || 'https://web.facebook.com/profile.php?id=61591488226786&sk=photos' }}
      SHEET_ID: ${{ secrets.SHEET_ID }}
      SHEET_TAB_NAME: fbimages
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      MAX_SCROLLS: ${{ github.event.inputs.max_scrolls || '3' }}
      CONCURRENCY: ${{ github.event.inputs.concurrency || '6' }}
      FOLDER_NAME: facebook_photos
      MEGA_FOLDER_NAME: fbimages
      MEGA_REMOTE: mega
      STORAGE_STATE_FILE: storage_state.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Assumes requirements.txt at repo root lists: playwright, beautifulsoup4,
      # google-api-python-client, google-auth. Adjust the path if yours differs.
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # This is the step your run was missing -- installs the playwright
      # Python bindings' matching browser binary + OS-level libs it needs.
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Install rclone
        run: |
          sudo -v
          curl https://rclone.org/install.sh | sudo bash

      # Write the Facebook session cookies (exported storage_state.json)
      # from a secret onto disk -- photos.py reads it from STORAGE_STATE_FILE.
      - name: Write Facebook storage_state.json
        run: echo '${{ secrets.STORAGE_STATE_JSON }}' > storage_state.json

      # Write rclone's config (which holds the Mega credentials) from a
      # secret. rclone.conf format, e.g.:
      #   [mega]
      #   type = mega
      #   user = you@example.com
      #   pass = <rclone-obscured-password>
      - name: Write rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.RCLONE_CONF }}' > ~/.config/rclone/rclone.conf

      - name: Run scraper
        run: python photos.py

      # Keep debug HTML / local CSV around even if a later step fails,
      # so you can diagnose without re-scraping.
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-output
          path: |
            output/**
          retention-days: 7
          if-no-files-found: ignore
