name: Facebook Reels -> Google Drive

on:
  workflow_dispatch:
    inputs:
      drive_folder_id:
        description: "Google Drive folder ID to upload downloaded reels to"
        required: true
        type: string
      reel_urls:
        description: "Facebook Reels tab URL(s), one per line"
        required: true
        type: string
        default: "https://www.facebook.com/profile.php?id=61573238759323&sk=reels_tab"
      folder_name:
        description: "Output folder name for this run"
        required: false
        default: "facebook_reels"
        type: string
      max_scrolls:
        description: "How many times to scroll each reels tab"
        required: false
        default: "2"
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install playwright google-auth google-auth-oauthlib google-api-python-client yt-dlp

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Write secrets to disk
        run: |
          echo '${{ secrets.GDRIVE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.FB_STORAGE_STATE }}' > storage_state.json

      - name: Run pipeline
        env:
          REEL_URLS: ${{ inputs.reel_urls }}
          MAX_SCROLLS: ${{ inputs.max_scrolls }}
          FOLDER_NAME: ${{ inputs.folder_name }}
          DRIVE_FOLDER_ID: ${{ inputs.drive_folder_id }}
          TOKEN_FILE: token.json
          STORAGE_STATE_FILE: storage_state.json
        run: python scripts/reels_pipeline.py

      - name: Upload run CSVs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-output-${{ github.run_id }}
          path: |
            output/*.csv
          retention-days: 7

      - name: Clean up secret files
        if: always()
        run: rm -f token.json storage_state.json fb_cookies.txt
